version: "2"
sql:
  - engine: "postgresql"
    queries: "query/"
    schema: "query/"
    gen:
      go:
        package: "repository"
        out: "../internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "text"
            go_type:
              import: "database/sql"
              type: "NullString"
            nullable: true
          - db_type: "varchar"
            go_type:
              import: "database/sql"
              type: "NullString"
            nullable: true
          - column: "boards.color"
            go_type:
              import: "database/sql"
              type: "NullString"
            nullable: true
          - column: "cards.due_date"
            go_type:
              import: "database/sql"
              type: "NullTime"
            nullable: true
